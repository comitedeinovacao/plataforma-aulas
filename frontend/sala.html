<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sala de Aula — Senac</title>
  <link rel="stylesheet" href="assets/senac.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0a0e1a; }

    /* ─ Top bar ─ */
    .topbar {
      background: var(--azul);
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .topbar-lesson { font-size: 0.875rem; font-weight: 700; color: var(--branco); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-right { display: flex; align-items: center; gap: 0.625rem; flex-shrink: 0; }

    .student-name-pill {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(247,148,29,.2); border: 1px solid rgba(247,148,29,.4);
      border-radius: 100px; padding: 0.25rem 0.875rem;
      color: var(--laranja); font-size: 0.8rem; font-weight: 700;
    }
    .slide-info {
      font-size: 0.75rem; color: rgba(255,255,255,.5); font-weight: 600;
    }

    /* ─ Stage ─ */
    .stage {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    /* ─ Viewer ─ */
    .viewer {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: #111827; position: relative;
    }

    #pdfCanvas { max-width: 100%; max-height: 100%; display: block; box-shadow: 0 4px 40px rgba(0,0,0,.6); }
    #htmlFrame { width: 100%; height: 100%; border: none; display: none; }

    #drawCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    .viewer-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: rgba(255,255,255,.45);
      text-align: center; padding: 1rem;
    }
    .viewer-state svg { opacity: .3; }

    /* ─ Quiz overlay ─ */
    .quiz-overlay {
      position: absolute; inset: 0; z-index: 50;
      background: rgba(5,12,35,.9);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; display: none;
    }

    .quiz-card {
      background: #1a2035;
      border: 1.5px solid rgba(247,148,29,.3);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: modalIn .3s ease;
    }

    .quiz-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(247,148,29,.15); border: 1px solid rgba(247,148,29,.3);
      border-radius: 100px; padding: .3rem .875rem;
      color: var(--laranja); font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 1.25rem;
    }

    .quiz-question {
      font-size: clamp(1rem, 3vw, 1.375rem);
      font-weight: 700; color: var(--branco); line-height: 1.4;
      margin-bottom: 1.5rem;
    }

    .quiz-options { display: flex; flex-direction: column; gap: 0.75rem; }

    .option-btn {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem;
      background: rgba(255,255,255,.05); border: 2px solid rgba(255,255,255,.1);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: var(--ease); text-align: left; width: 100%;
      font-family: inherit;
    }
    .option-btn:hover:not(:disabled) { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.25); }
    .option-btn:disabled { cursor: not-allowed; }
    .option-btn.selected { border-color: var(--laranja); background: rgba(247,148,29,.12); }
    .option-btn.correct  { border-color: #22c55e; background: rgba(34,197,94,.12); }
    .option-btn.wrong    { border-color: #ef4444; background: rgba(239,68,68,.1); opacity: .7; }

    .option-letter-badge {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .875rem; font-weight: 800;
      background: rgba(255,255,255,.1); color: var(--branco);
      flex-shrink: 0;
    }
    .option-btn.selected .option-letter-badge { background: var(--laranja); }
    .option-btn.correct  .option-letter-badge { background: #22c55e; }
    .option-btn.wrong    .option-letter-badge { background: #ef4444; }

    .option-text { font-size: 1rem; font-weight: 600; color: rgba(255,255,255,.9); }

    /* Result card */
    .result-card {
      display: none;
      background: rgba(255,255,255,.05);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      text-align: center;
      margin-top: 1rem;
    }
    .result-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .result-text { font-size: 1rem; font-weight: 700; color: var(--branco); }
    .result-sub  { font-size: 0.875rem; color: rgba(255,255,255,.5); margin-top: 0.25rem; }

    /* ─ Waiting state ─ */
    .waiting-msg {
      font-size: .8125rem; color: rgba(255,255,255,.35);
      text-align: center; margin-top: .5rem;
    }

    /* ─ Poll overlay ─ */
    .poll-overlay {
      position: absolute; inset: 0; z-index: 50;
      background: rgba(5,12,35,.92);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .poll-card {
      background: #1a2035;
      border: 1.5px solid rgba(247,148,29,.3);
      border-radius: 16px; padding: 2rem;
      width: 100%; max-width: 520px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: modalIn .3s ease;
    }
    .poll-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(247,148,29,.15); border: 1px solid rgba(247,148,29,.3);
      border-radius: 100px; padding: .3rem .875rem;
      color: var(--laranja); font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 1.25rem;
    }
    .poll-question {
      font-size: clamp(.95rem, 2.5vw, 1.25rem);
      font-weight: 700; color: var(--branco); line-height: 1.4;
      margin-bottom: 1.25rem;
    }
    .poll-input {
      width: 100%; background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: .75rem 1rem;
      font-family: inherit; font-size: 1rem; color: #fff;
      outline: none; resize: none; transition: border-color .2s;
    }
    .poll-input:focus { border-color: var(--laranja); }
    .poll-input::placeholder { color: rgba(255,255,255,.3); }
    .rank-sort-list { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
    .rank-sort-item { display: flex; align-items: center; gap: .75rem; background: rgba(255,255,255,.07); border-radius: 10px; padding: .75rem 1rem; }
    .rank-sort-pos { font-size: 1rem; font-weight: 800; color: var(--laranja); width: 24px; text-align: center; flex-shrink: 0; }
    .rank-sort-label { flex: 1; font-size: .95rem; font-weight: 600; color: rgba(255,255,255,.9); }
    .rank-sort-btns { display: flex; gap: 4px; }
    .rank-sort-btn { width: 30px; height: 30px; background: rgba(255,255,255,.1); border: none; border-radius: 6px; cursor: pointer; color: rgba(255,255,255,.6); font-size: .85rem; display: flex; align-items: center; justify-content: center; transition: var(--ease); }
    .rank-sort-btn:hover:not(:disabled) { background: rgba(255,255,255,.2); color: #fff; }
    .rank-sort-btn:disabled { opacity: .3; cursor: not-allowed; }
    .poll-sent { text-align: center; padding: 1.5rem 0; }
    .poll-sent-icon { font-size: 2.5rem; margin-bottom: .5rem; }
    .poll-sent-text { font-size: 1rem; font-weight: 700; color: var(--branco); }
    .poll-sent-sub { font-size: .875rem; color: rgba(255,255,255,.4); margin-top: .25rem; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <p class="topbar-lesson" id="topbarLesson">Conectando...</p>
    <div class="topbar-right">
      <span class="slide-info" id="slideInfo"></span>
      <span class="student-name-pill" id="namePill">—</span>
    </div>
  </div>

  <!-- Stage -->
  <div class="stage">
    <div class="viewer" id="viewer">

      <!-- Loading/waiting state -->
      <div class="viewer-state" id="viewerState">
        <div class="spinner" style="border-color:rgba(255,255,255,.1);border-top-color:var(--laranja);width:48px;height:48px;"></div>
        <p id="stateMsg">Conectando à sala...</p>
      </div>

      <canvas id="pdfCanvas"></canvas>
      <iframe id="htmlFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <canvas id="drawCanvas"></canvas>

      <!-- Quiz overlay -->
      <div class="quiz-overlay" id="quizOverlay">
        <div class="quiz-card">
          <div class="quiz-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Quiz ao vivo
          </div>
          <p class="quiz-question" id="quizQuestion">—</p>
          <div class="quiz-options" id="quizOptions"></div>
          <div class="result-card" id="resultCard">
            <div class="result-icon" id="resultIcon"></div>
            <p class="result-text" id="resultText"></p>
            <p class="result-sub" id="resultSub"></p>
          </div>
          <p class="waiting-msg hidden" id="waitingMsg">Aguarde o professor encerrar o quiz...</p>
        </div>
      </div>

      <!-- Poll overlay (nuvem / mural / ranking) -->
      <div class="poll-overlay" id="pollOverlay">
        <div class="poll-card">
          <div class="poll-badge" id="pollBadge">Enquete ao vivo</div>
          <p class="poll-question" id="pollQuestion">—</p>

          <!-- Word cloud input -->
          <div id="pollWordInput">
            <input type="text" class="poll-input" id="wcInput" placeholder="Digite uma palavra ou expressão..." maxlength="40">
            <button type="button" class="btn btn-primary w-full" id="wcSendBtn" style="margin-top:1rem;">Enviar resposta</button>
          </div>

          <!-- Mural input -->
          <div id="pollMuralInput" style="display:none;">
            <textarea class="poll-input" id="muralInput" rows="3" placeholder="Escreva sua frase..." maxlength="200"></textarea>
            <button type="button" class="btn btn-primary w-full" id="muralSendBtn" style="margin-top:1rem;">Enviar resposta</button>
          </div>

          <!-- Ranking input -->
          <div id="pollRankInput" style="display:none;">
            <p style="font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:.75rem;">Use ▲▼ para ordenar do mais importante (1°) ao menos importante.</p>
            <div class="rank-sort-list" id="rankSortList"></div>
            <button type="button" class="btn btn-primary w-full" id="rankSendBtn">Confirmar ordem</button>
          </div>

          <!-- Sent confirmation -->
          <div class="poll-sent" id="pollSent" style="display:none;">
            <div class="poll-sent-icon">✅</div>
            <p class="poll-sent-text">Resposta enviada!</p>
            <p class="poll-sent-sub">Aguarde o professor encerrar a enquete.</p>
          </div>

          <!-- Live results (shown after submitting) -->
          <div id="pollLiveResults" style="display:none;margin-top:1.25rem;border-top:1px solid rgba(255,255,255,.08);padding-top:1rem;">
            <p style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);margin-bottom:.75rem;">Participações da turma</p>
            <div id="pollLiveContent"></div>
            <p style="font-size:.7rem;color:rgba(255,255,255,.3);text-align:center;margin-top:.625rem;" id="pollLiveCount"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PDF.js & Socket.io -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ─── Params ────────────────────────────────────────────────────────────────
    const params   = new URLSearchParams(location.search);
    const roomCode = params.get('sala')?.toUpperCase();
    const myName   = params.get('nome') || 'Aluno';
    if (!roomCode) location.href = 'aluno.html';

    document.getElementById('namePill').textContent = myName;

    // ─── State ─────────────────────────────────────────────────────────────────
    let pdfDoc = null;
    let lessonType = 'pdf';
    let lessonFilename = '';
    let answered = false;
    let currentQuiz = null;
    let myAnswer = null;

    // Drawing
    const drawCanvas = document.getElementById('drawCanvas');
    const drawCtx = drawCanvas.getContext('2d');
    let drawLastX = 0, drawLastY = 0;
    let drawPending = null;

    // ─── Socket ────────────────────────────────────────────────────────────────
    const socket = io();
    socket.emit('student:join', { roomCode, name: myName });

    socket.on('join:success', ({ currentSlide, totalSlides, lesson, activeQuiz, activePoll }) => {
      document.getElementById('topbarLesson').textContent = lesson.name;
      lessonType = lesson.type;
      lessonFilename = lesson.url || `/uploads/${lesson.filename}`;
      loadLesson(lessonFilename, lesson.type, currentSlide, totalSlides, lesson.name);
      if (activeQuiz) showQuiz(activeQuiz);
      if (activePoll) showPollOverlay(activePoll);
    });

    socket.on('join:error', (msg) => {
      document.getElementById('stateMsg').textContent = msg;
      document.getElementById('stateMsg').style.color = '#ef4444';
    });

    socket.on('slide:changed', ({ slide, total }) => {
      document.getElementById('viewerState').style.display = 'none';
      updateSlide(slide, total);
    });

    socket.on('quiz:launched', (quiz) => {
      currentQuiz = quiz;
      answered = false;
      myAnswer = null;
      showQuiz(quiz);
    });

    socket.on('quiz:answered', ({ correct }) => {
      showResult(correct);
    });

    socket.on('quiz:ended', ({ correctAnswer, breakdown }) => {
      document.getElementById('waitingMsg').classList.add('hidden');
      if (!answered) {
        const resultCard = document.getElementById('resultCard');
        resultCard.style.display = 'block';
        document.getElementById('resultIcon').textContent = '⏱';
        document.getElementById('resultText').textContent = 'Tempo esgotado';
        document.getElementById('resultSub').textContent = `A resposta correta era: ${correctAnswer}`;
        revealAnswers(correctAnswer);
      }
      setTimeout(() => hideQuiz(), 3500);
    });

    // Mensagens do iframe
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'activityReady' || e.data?.type === 'quizReady') {
        document.getElementById('htmlFrame').style.pointerEvents = 'auto';
      }
      if (e.data?.type === 'quizComplete') {
        const { score, total } = e.data;
        showQuizToast(score, total);
      }
    });

    function showQuizToast(score, total) {
      const pct = Math.round(score / total * 100);
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a2035;border:1.5px solid rgba(247,148,29,.4);border-radius:12px;padding:.875rem 1.5rem;color:#fff;font-size:.875rem;font-weight:700;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center;white-space:nowrap;';
      el.textContent = `Quiz concluído! ${score}/${total} acertos (${pct}%)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    socket.on('draw:data', (data) => {
      const w = drawCanvas.width, h = drawCanvas.height;
      if (data.type === 'start') {
        drawPending = { x: data.x * w, y: data.y * h, color: data.color, size: data.size, mode: data.mode };
      } else if (data.type === 'move' && drawPending) {
        const x2 = data.x * w, y2 = data.y * h;
        applyDraw(drawPending.x, drawPending.y, x2, y2, drawPending.color, drawPending.size, drawPending.mode);
        drawPending.x = x2; drawPending.y = y2;
      }
    });

    socket.on('draw:clear', () => {
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    });

    socket.on('session:ended', () => {
      document.getElementById('viewerState').style.display = 'flex';
      document.getElementById('stateMsg').textContent = 'O professor encerrou a sessão.';
    });

    // ─── Lesson loader ─────────────────────────────────────────────────────────
    async function loadLesson(url, type, startSlide, totalSlides, lessonName = '') {
      if (type === 'pdf') {
        document.getElementById('htmlFrame').style.display = 'none';
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        await renderPage(startSlide + 1, totalSlides || pdfDoc.numPages);
      } else {
        document.getElementById('pdfCanvas').style.display = 'none';
        const frame = document.getElementById('htmlFrame');
        frame.style.display = 'block';
        if (url.startsWith('http')) {
          const params = new URLSearchParams({
            url,
            name: myName,
            room: roomCode,
            lessonName: lessonName,
            lessonType: type,
          });
          frame.src = `/api/proxy-html?${params}`;
        } else {
          frame.src = url;
        }
        frame.onload = () => {
          document.getElementById('viewerState').style.display = 'none';
          // Quiz type must stay interactive; other HTML is blocked until activityReady
          if (type !== 'quiz') frame.style.pointerEvents = 'none';
        };
        document.getElementById('slideInfo').textContent = '';
      }
    }

    async function renderPage(pageNum, total) {
      if (!pdfDoc) return;
      const page = await pdfDoc.getPage(pageNum);
      const canvas = document.getElementById('pdfCanvas');
      const ctx = canvas.getContext('2d');
      const viewer = document.getElementById('viewer');

      const vw = viewer.clientWidth;
      const vh = viewer.clientHeight;
      const vp0 = page.getViewport({ scale: 1 });
      const scale = Math.min(vw / vp0.width, vh / vp0.height) * 0.97;
      const vp = page.getViewport({ scale });

      canvas.width = vp.width;
      canvas.height = vp.height;
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      // Sync draw canvas
      drawCanvas.width = vw;
      drawCanvas.height = vh;

      document.getElementById('viewerState').style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('slideInfo').textContent = total ? `${pageNum} / ${total}` : '';
    }

    async function updateSlide(slide, total) {
      if (lessonType === 'pdf' && pdfDoc) {
        await renderPage(slide + 1, total);
      } else if (lessonType === 'html') {
        const frame = document.getElementById('htmlFrame');
        try { frame.contentWindow.postMessage({ type: 'goto', slide }, '*'); } catch(e) {}
      }
      if (total) document.getElementById('slideInfo').textContent = `${slide + 1} / ${total}`;
    }

    // ─── Drawing ───────────────────────────────────────────────────────────────
    function applyDraw(x1, y1, x2, y2, color, size, mode) {
      drawCtx.lineWidth = size;
      drawCtx.lineCap = 'round';
      drawCtx.lineJoin = 'round';
      if (mode === 'eraser') {
        drawCtx.globalCompositeOperation = 'destination-out';
        drawCtx.strokeStyle = 'rgba(0,0,0,1)';
        drawCtx.lineWidth = size * 4;
      } else {
        drawCtx.globalCompositeOperation = 'source-over';
        drawCtx.strokeStyle = color;
      }
      drawCtx.beginPath();
      drawCtx.moveTo(x1, y1);
      drawCtx.lineTo(x2, y2);
      drawCtx.stroke();
    }

    // ─── Quiz ──────────────────────────────────────────────────────────────────
    const LETTERS = ['A', 'B', 'C', 'D'];

    function showQuiz(quiz) {
      currentQuiz = quiz;
      answered = false;
      document.getElementById('quizQuestion').textContent = quiz.question;

      const optContainer = document.getElementById('quizOptions');
      optContainer.innerHTML = quiz.options.map((opt, i) => `
        <button class="option-btn" data-answer="${opt}" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">
          <div class="option-letter-badge">${LETTERS[i]}</div>
          <span class="option-text">${opt}</span>
        </button>
      `).join('');

      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('waitingMsg').classList.add('hidden');
      document.getElementById('quizOverlay').style.display = 'flex';
    }

    function selectAnswer(btn, answer) {
      if (answered) return;
      answered = true;
      myAnswer = answer;

      // Mark selected
      document.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if (b === btn) b.classList.add('selected');
      });

      socket.emit('quiz:answer', { answer });
      document.getElementById('waitingMsg').classList.remove('hidden');
    }

    function showResult(correct) {
      const resultCard = document.getElementById('resultCard');
      resultCard.style.display = 'block';
      if (correct) {
        document.getElementById('resultIcon').textContent = '🎉';
        document.getElementById('resultText').textContent = 'Resposta correta!';
        document.getElementById('resultSub').textContent = 'Muito bem! Continue assim.';
        resultCard.style.background = 'rgba(34,197,94,.1)';
        resultCard.style.border = '1.5px solid rgba(34,197,94,.3)';
      } else {
        document.getElementById('resultIcon').textContent = '❌';
        document.getElementById('resultText').textContent = 'Resposta incorreta';
        document.getElementById('resultSub').textContent = 'Não desanime, continue tentando!';
        resultCard.style.background = 'rgba(239,68,68,.1)';
        resultCard.style.border = '1.5px solid rgba(239,68,68,.3)';
      }
    }

    function revealAnswers(correctAnswer) {
      document.querySelectorAll('.option-btn').forEach(btn => {
        const ans = btn.dataset.answer;
        if (ans === correctAnswer) btn.classList.add('correct');
        else if (ans === myAnswer) btn.classList.add('wrong');
      });
    }

    function hideQuiz() {
      document.getElementById('quizOverlay').style.display = 'none';
      currentQuiz = null;
    }

    // ─── Poll (nuvem / mural / ranking) ───────────────────────────────────────
    let currentPoll  = null;
    let pollAnswered = false;
    let rankOrder    = [];

    socket.on('poll:launched', (poll) => {
      currentPoll  = poll;
      pollAnswered = false;
      showPollOverlay(poll);
    });

    socket.on('poll:responded', () => {
      pollAnswered = true;
      showPollSent();
    });

    socket.on('poll:ended', () => hidePollOverlay());

    function showPollOverlay(poll) {
      const BADGES = { wordcloud: '☁ Nuvem de Palavras', mural: '💬 Mural de Frases', ranking: '↕ Ranking' };
      document.getElementById('pollBadge').textContent    = BADGES[poll.type] || 'Enquete ao vivo';
      document.getElementById('pollQuestion').textContent = poll.question;

      document.getElementById('pollWordInput').style.display  = 'none';
      document.getElementById('pollMuralInput').style.display = 'none';
      document.getElementById('pollRankInput').style.display  = 'none';
      document.getElementById('pollSent').style.display       = 'none';

      if (poll.type === 'wordcloud') {
        document.getElementById('pollWordInput').style.display = 'block';
        document.getElementById('wcInput').value = '';
        document.getElementById('wcSendBtn').disabled = false;
      } else if (poll.type === 'mural') {
        document.getElementById('pollMuralInput').style.display = 'block';
        document.getElementById('muralInput').value = '';
        document.getElementById('muralSendBtn').disabled = false;
      } else if (poll.type === 'ranking') {
        rankOrder = [...poll.items];
        document.getElementById('pollRankInput').style.display = 'block';
        document.getElementById('rankSendBtn').disabled = false;
        renderRankSort();
      }

      document.getElementById('pollOverlay').style.display = 'flex';
    }

    function hidePollOverlay() {
      document.getElementById('pollOverlay').style.display = 'none';
      document.getElementById('pollLiveResults').style.display = 'none';
      document.getElementById('pollLiveContent').innerHTML = '';
      currentPoll = null;
    }

    function showPollSent() {
      document.getElementById('pollWordInput').style.display  = 'none';
      document.getElementById('pollMuralInput').style.display = 'none';
      document.getElementById('pollRankInput').style.display  = 'none';
      document.getElementById('pollSent').style.display       = 'block';
      document.getElementById('pollLiveResults').style.display = 'block';
    }

    function renderRankSort() {
      document.getElementById('rankSortList').innerHTML = rankOrder.map((item, i) => `
        <div class="rank-sort-item">
          <div class="rank-sort-pos">${i + 1}°</div>
          <div class="rank-sort-label">${item}</div>
          <div class="rank-sort-btns">
            <button type="button" class="rank-sort-btn" onclick="moveRankItem(${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
            <button type="button" class="rank-sort-btn" onclick="moveRankItem(${i},1)"  ${i === rankOrder.length - 1 ? 'disabled' : ''}>▼</button>
          </div>
        </div>`).join('');
    }

    function moveRankItem(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= rankOrder.length) return;
      [rankOrder[i], rankOrder[j]] = [rankOrder[j], rankOrder[i]];
      renderRankSort();
    }

    document.getElementById('wcSendBtn').addEventListener('click', () => {
      const val = document.getElementById('wcInput').value.trim();
      if (!val) return;
      socket.emit('poll:respond', { response: val });
      document.getElementById('wcSendBtn').disabled = true;
    });

    document.getElementById('muralSendBtn').addEventListener('click', () => {
      const val = document.getElementById('muralInput').value.trim();
      if (!val) return;
      socket.emit('poll:respond', { response: val });
      document.getElementById('muralSendBtn').disabled = true;
    });

    document.getElementById('rankSendBtn').addEventListener('click', () => {
      socket.emit('poll:respond', { response: rankOrder });
      document.getElementById('rankSendBtn').disabled = true;
    });

    // Live poll results (shown after student submits)
    const WC_COLORS_S = ['var(--laranja)','#22c55e','#44BBFF','#FFE033','#FF88AA','#C084FC'];
    const MURAL_SCHEMES_S = [
      { bg:'rgba(247,148,29,.12)', border:'#F7941D' },
      { bg:'rgba(18,163,184,.12)', border:'#12A3B8' },
      { bg:'rgba(34,197,94,.12)',  border:'#22c55e' },
      { bg:'rgba(99,102,241,.12)', border:'#818cf8' },
    ];

    socket.on('poll:results', ({ responses, poll }) => {
      if (!pollAnswered) return;
      renderPollLiveResults(responses, poll);
    });

    function renderPollLiveResults(responses, poll) {
      const container = document.getElementById('pollLiveContent');
      const countEl   = document.getElementById('pollLiveCount');
      countEl.textContent = `${responses.length} resposta${responses.length !== 1 ? 's' : ''}`;

      if (poll.type === 'wordcloud') {
        const freq = {};
        responses.forEach(r => {
          const w = String(r.response).trim().toLowerCase();
          freq[w] = (freq[w] || 0) + 1;
        });
        const maxF = Math.max(...Object.values(freq), 1);
        const html = Object.entries(freq)
          .sort((a, b) => b[1] - a[1])
          .map(([w, n], i) => {
            const size = (0.85 + (n / maxF) * 0.9).toFixed(2);
            return `<span style="font-size:${size}rem;font-weight:800;color:${WC_COLORS_S[i % WC_COLORS_S.length]};margin:3px 5px;display:inline-block">${w}</span>`;
          }).join('');
        container.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;">${html}</div>`;

      } else if (poll.type === 'mural') {
        container.innerHTML = responses.map((r, i) => {
          const s = MURAL_SCHEMES_S[i % MURAL_SCHEMES_S.length];
          return `<div style="background:${s.bg};border-left:3px solid ${s.border};border-radius:8px;padding:8px 12px;margin-bottom:6px;">
            <div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.65;margin-bottom:3px;color:${s.border}">${r.name}</div>
            <div style="font-size:.85rem;color:rgba(255,255,255,.9);">${r.response}</div>
          </div>`;
        }).join('');

      } else if (poll.type === 'ranking') {
        const scores = {};
        poll.items.forEach(it => { scores[it] = 0; });
        responses.forEach(r => {
          const order = Array.isArray(r.response) ? r.response : poll.items;
          order.forEach((it, pos) => { if (scores[it] !== undefined) scores[it] += pos; });
        });
        const sorted = poll.items.slice().sort((a, b) => scores[a] - scores[b]);
        const maxS = responses.length * (poll.items.length - 1) || 1;
        const medals = ['🥇','🥈','🥉'];
        container.innerHTML = sorted.map((it, i) => {
          const pct = Math.max(0, Math.round(100 - (scores[it] / maxS) * 100));
          return `<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem .875rem;background:rgba(255,255,255,.05);border-radius:8px;margin-bottom:.4rem;">
            <span style="font-size:1rem;width:24px;text-align:center">${medals[i] || (i+1)+'°'}</span>
            <span style="flex:1;font-size:.875rem;font-weight:600;color:rgba(255,255,255,.9)">${it}</span>
            <div style="width:48px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:var(--laranja);border-radius:3px"></div>
            </div>
          </div>`;
        }).join('');
      }
    }
  </script>
</body>
</html>
