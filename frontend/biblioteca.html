<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Plataforma Senac</title>
  <link rel="stylesheet" href="assets/senac.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      height: 52px; flex-shrink: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid var(--cinza);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; gap: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .tb-brand { display: flex; align-items: center; gap: .75rem; }
    .tb-brand-name { font-size: .9rem; font-weight: 800; color: var(--azul); }
    .tb-brand-sub  { font-size: .68rem; color: var(--texto-med); }
    .tb-right { display: flex; align-items: center; gap: .625rem; }

    /* ── App layout ── */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 228px; flex-shrink: 0;
      background: var(--azul);
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
    }
    .sb-section {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: rgba(255,255,255,.35);
      padding: 1rem 1.125rem .4rem;
    }
    .sb-item {
      display: flex; align-items: center; gap: .625rem;
      padding: .625rem 1.125rem;
      background: none; border: none; width: 100%; text-align: left;
      color: rgba(255,255,255,.65); font-size: .84rem; font-weight: 500;
      font-family: inherit; cursor: pointer; transition: background .15s, color .15s;
    }
    .sb-item:hover { background: rgba(255,255,255,.09); color: #fff; }
    .sb-item.active { background: rgba(255,255,255,.15); color: #fff; }
    .sb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sb-count {
      margin-left: auto; font-size: .68rem; font-weight: 700;
      background: rgba(255,255,255,.13); border-radius: 100px;
      padding: .1rem .5rem; color: rgba(255,255,255,.55); flex-shrink: 0;
    }
    .sb-item.active .sb-count { background: rgba(255,255,255,.22); color: rgba(255,255,255,.9); }
    .sb-spacer { flex: 1; min-height: 1rem; }
    .sb-footer { padding: .75rem 1.125rem; border-top: 1px solid rgba(255,255,255,.1); }
    .sb-add-btn {
      display: flex; align-items: center; gap: .5rem;
      padding: .625rem .875rem; border-radius: 8px;
      background: rgba(247,148,29,.15); border: 1px solid rgba(247,148,29,.3);
      color: var(--laranja); font-size: .82rem; font-weight: 700;
      cursor: pointer; width: 100%; text-align: left; font-family: inherit;
      transition: background .15s;
    }
    .sb-add-btn:hover { background: rgba(247,148,29,.27); }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; background: var(--fundo); }
    .main-inner { max-width: 1100px; margin: 0 auto; padding: 1.75rem 1.75rem 3rem; }

    /* Session banner */
    .session-banner {
      background: var(--azul); color: var(--branco);
      border-radius: var(--radius); padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .session-code { font-size: 1.5rem; font-weight: 800; letter-spacing: .1em; color: var(--laranja); }

    /* Upload card */
    .upload-zone {
      border: 2.5px dashed var(--cinza); border-radius: var(--radius);
      padding: 2.25rem; text-align: center; cursor: pointer;
      transition: var(--ease); background: var(--branco); position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--laranja); background: rgba(247,148,29,.04); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-title { font-size: .9375rem; font-weight: 700; color: var(--azul); margin-top: .75rem; }
    .upload-sub   { font-size: .8125rem; color: var(--texto-med); margin-top: .3rem; }
    .upload-progress { display: none; margin-top: 1rem; }
    .progress-bar-wrap { background: var(--cinza); border-radius: 100px; height: 8px; overflow: hidden; margin-top: .5rem; }
    .progress-bar { background: linear-gradient(90deg, var(--azul), var(--laranja)); height: 100%; border-radius: 100px; transition: width .2s; width: 0%; }
    .name-row { display: flex; gap: .75rem; margin-top: 1rem; align-items: flex-end; flex-wrap: wrap; }
    .name-row .form-group { flex: 1; min-width: 140px; }

    /* Lessons grid */
    .grid-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: .5rem; flex-wrap: wrap; }
    .lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }

    /* Lesson card */
    .lesson-card {
      background: var(--branco); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column;
      transition: var(--ease); border: 2px solid transparent;
    }
    .lesson-card:hover { box-shadow: var(--shadow-lg); border-color: var(--cinza); transform: translateY(-2px); }
    .lesson-thumb {
      height: 140px; background: var(--azul);
      background-image: radial-gradient(circle at 70% 30%, rgba(247,148,29,.15) 0%, transparent 60%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative;
    }
    .lesson-thumb svg { opacity: .6; color: var(--branco); }
    .lesson-thumb-badge { position: absolute; top: 10px; right: 10px; }
    .lesson-info { padding: 1rem 1.25rem; flex: 1; display: flex; flex-direction: column; gap: .5rem; }
    .lesson-name { font-size: .9375rem; font-weight: 700; color: var(--texto); line-height: 1.3; }
    .lesson-meta { font-size: .75rem; color: var(--texto-med); }
    .lesson-actions { padding: .75rem 1.25rem; border-top: 1px solid var(--cinza); display: flex; gap: .5rem; }
    .lesson-actions .btn { flex: 1; }

    /* Bloco chip */
    .bloco-chip {
      display: inline-flex; align-items: center;
      border-radius: 100px; padding: .22rem .75rem;
      font-size: .68rem; font-weight: 700; color: #fff;
      cursor: pointer; border: none; font-family: inherit; transition: opacity .15s;
    }
    .bloco-chip:hover { opacity: .8; }
    .bloco-none-btn {
      display: inline-flex; align-items: center;
      font-size: .68rem; font-weight: 600; color: var(--texto-med);
      cursor: pointer; border: 1.5px dashed var(--cinza); border-radius: 100px;
      padding: .2rem .625rem; background: none; font-family: inherit;
      transition: border-color .15s, color .15s;
    }
    .bloco-none-btn:hover { border-color: var(--laranja); color: var(--laranja); }

    /* Bloco inline editor */
    .bloco-editor { display: none; flex-direction: column; gap: .4rem; margin-top: .375rem; }
    .bloco-editor.open { display: flex; }
    .bloco-presets { display: flex; flex-wrap: wrap; gap: .3rem; }
    .preset-btn {
      font-size: .67rem; font-weight: 700; padding: .2rem .6rem;
      border-radius: 100px; border: none; cursor: pointer; color: #fff;
      font-family: inherit; transition: opacity .15s;
    }
    .preset-btn:hover { opacity: .8; }
    .bloco-input-row { display: flex; gap: .375rem; }

    /* Empty state */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--texto-med); grid-column: 1/-1; }
    .empty-state svg { margin: 0 auto 1.5rem; opacity: .3; display: block; }

    @media (max-width: 680px) {
      .app-body { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; height: auto; overflow-x: auto; overflow-y: hidden; padding: .375rem .375rem; }
      .sb-section, .sb-spacer, .sb-footer { display: none; }
      .sb-item { display: inline-flex; border-radius: 100px; white-space: nowrap; padding: .4rem .875rem; min-width: auto; }
      .main-inner { padding: 1.25rem 1rem 2rem; }
      .lessons-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-brand">
    <img src="https://jantardocomercio.com.br/wp-content/uploads/2022/05/site_senac.png" alt="Senac" style="height:28px;width:auto;">
    <div>
      <div class="tb-brand-name">Plataforma de Aulas</div>
      <div class="tb-brand-sub">Senac Araçatuba</div>
    </div>
  </div>
  <div class="tb-right">
    <span style="font-size:.78rem;font-weight:600;color:var(--texto-med);">Professor</span>
    <button type="button" class="btn btn-ghost btn-sm" id="logoutBtn">Sair</button>
  </div>
</div>

<!-- App body -->
<div class="app-body">

  <!-- ══ Sidebar ══════════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <p class="sb-section">Módulos</p>
    <div id="navList"></div>
    <div class="sb-spacer"></div>
    <div class="sb-footer">
      <button type="button" class="sb-add-btn" id="sidebarUploadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova aula
      </button>
    </div>
  </aside>

  <!-- ══ Main ════════════════════════════════════════════════════════════ -->
  <div class="main">
    <div class="main-inner">

      <!-- Session banner -->
      <div class="session-banner hidden" id="sessionBanner">
        <div>
          <p class="text-sm" style="opacity:.8">Aula em andamento</p>
          <p style="font-weight:700" id="bannerLessonName">—</p>
        </div>
        <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;">
          <div>
            <p class="text-xs" style="opacity:.7;margin-bottom:.2rem;">CÓDIGO DA SALA</p>
            <p class="session-code" id="bannerCode">——</p>
          </div>
          <div style="display:flex;gap:.5rem;">
            <button type="button" class="btn btn-primary btn-sm" id="bannerOpenBtn">Abrir aula</button>
            <button type="button" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,.3)" id="bannerEndBtn">Encerrar</button>
          </div>
        </div>
      </div>

      <!-- Upload card (hidden by default) -->
      <div class="card mb-lg hidden" id="uploadCard">
        <div class="card-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <h2 style="color:var(--azul);margin:0;font-size:1.1rem;">Enviar nova aula</h2>
            <button type="button" class="btn btn-ghost btn-sm" id="closeUploadBtn">✕ Fechar</button>
          </div>

          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept=".pdf,.html,.htm" aria-label="Selecionar arquivo PDF ou HTML" title="Selecionar arquivo PDF ou HTML">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--azul)" stroke-width="1.5" style="opacity:.6;margin:0 auto;display:block;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p class="upload-title">Arraste o arquivo ou clique aqui</p>
            <p class="upload-sub">PDF ou HTML — até 50 MB</p>
          </div>

          <div class="name-row hidden" id="nameRow">
            <div class="form-group">
              <label class="label" for="lessonName">Nome da aula</label>
              <input type="text" id="lessonName" class="input input-sm" placeholder="Ex: Aula 01 — Fundamentos de IA">
            </div>
            <div class="form-group" style="max-width:200px;">
              <label class="label" for="lessonBlocoInput">Bloco / Módulo</label>
              <input type="text" id="lessonBlocoInput" class="input input-sm" placeholder="Ex: Bloco 2" list="blocoDL">
              <datalist id="blocoDL"></datalist>
            </div>
            <button type="button" class="btn btn-primary" id="uploadBtn">Enviar</button>
            <button type="button" class="btn btn-ghost" id="cancelUploadBtn">Cancelar</button>
          </div>

          <div class="upload-progress" id="uploadProgress">
            <p class="text-sm text-muted" id="progressText">Enviando...</p>
            <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
          </div>
        </div>
      </div>

      <!-- Grid header -->
      <div class="grid-header">
        <h2 style="color:var(--azul);" id="gridTitle">Todas as aulas</h2>
        <span class="badge badge-off" id="lessonCount">0 aulas</span>
      </div>

      <div id="lessonsGrid" class="lessons-grid">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="spinner" style="margin:0 auto 1rem;"></div>
          <p>Carregando...</p>
        </div>
      </div>

    </div>
  </div>

</div><!-- /app-body -->

<div id="toast-container"></div>

<script>
// ─── Auth guard ────────────────────────────────────────────────────────────────
fetch('/api/me').then(r => r.json()).then(d => {
  if (!d.authenticated) location.href = 'login.html';
});
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = 'login.html';
});

// ─── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── Helpers ───────────────────────────────────────────────────────────────────
function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ─── Bloco colors ──────────────────────────────────────────────────────────────
const PALETTE = ['#004587','#F7941D','#16a34a','#7c3aed','#0891b2','#dc2626','#d97706','#0f766e'];
function blocoColor(b) {
  if (!b) return '#8ea5bc';
  let h = 0;
  for (const c of b) h = c.charCodeAt(0) + ((h << 5) - h);
  return PALETTE[Math.abs(h) % PALETTE.length];
}

// ─── State ─────────────────────────────────────────────────────────────────────
let lessons      = [];
let activeBloco  = null; // null = todas, '' = sem módulo, string = bloco name

// ─── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const blocos  = [...new Set(lessons.map(l => l.bloco || '').filter(Boolean))].sort();
  const noBloco = lessons.filter(l => !l.bloco).length;

  // Update datalist for upload
  const dl = document.getElementById('blocoDL');
  dl.innerHTML = blocos.map(b => `<option value="${b}">`).join('');

  let html = `
    <button class="sb-item ${activeBloco === null ? 'active' : ''}" onclick="selectBloco(null)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Todas as aulas
      <span class="sb-count">${lessons.length}</span>
    </button>`;

  blocos.forEach(b => {
    const count = lessons.filter(l => l.bloco === b).length;
    const color = blocoColor(b);
    const esc   = b.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += `
      <button class="sb-item ${activeBloco === b ? 'active' : ''}" onclick="selectBloco('${esc}')">
        <span class="sb-dot" style="background:${color}"></span>
        ${b}
        <span class="sb-count">${count}</span>
      </button>`;
  });

  if (noBloco > 0) {
    html += `
      <button class="sb-item ${activeBloco === '' ? 'active' : ''}" onclick="selectBloco('')">
        <span class="sb-dot" style="background:#8ea5bc"></span>
        Sem módulo
        <span class="sb-count">${noBloco}</span>
      </button>`;
  }

  document.getElementById('navList').innerHTML = html;
}

function selectBloco(bloco) {
  activeBloco = bloco;
  buildSidebar();
  renderLessons();
}

// ─── Lessons ───────────────────────────────────────────────────────────────────
async function loadLessons() {
  const res = await fetch('/api/lessons');
  if (!res.ok) return;
  lessons = await res.json();
  buildSidebar();
  renderLessons();
}

function renderLessons() {
  const filtered = activeBloco === null
    ? lessons
    : lessons.filter(l => (l.bloco || '') === activeBloco);

  const title = activeBloco === null ? 'Todas as aulas'
    : activeBloco === ''   ? 'Sem módulo'
    : activeBloco;
  document.getElementById('gridTitle').textContent   = title;
  document.getElementById('lessonCount').textContent = `${filtered.length} aula${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    document.getElementById('lessonsGrid').innerHTML = `
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p class="font-bold mt-md">Nenhuma aula neste módulo</p>
        <p class="text-sm mt-sm">Envie um PDF ou HTML ou atribua um módulo a uma aula existente</p>
      </div>`;
    return;
  }

  document.getElementById('lessonsGrid').innerHTML = filtered.map(l => cardHtml(l)).join('');
}

function cardHtml(l) {
  const bloco    = l.bloco || '';
  const color    = blocoColor(bloco);
  const sName    = l.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  const dateStr  = fmtDate(l.uploaded_at || l.uploadedAt);
  const sizeStr  = fmtSize(l.size);

  const chipHtml = bloco
    ? `<button class="bloco-chip" style="background:${color}" onclick="toggleEditor('${l.id}')">${bloco}</button>`
    : `<button class="bloco-none-btn" onclick="toggleEditor('${l.id}')">+ módulo</button>`;

  const iconPdf  = '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/><polyline points="9 9 10 9"/>';
  const iconHtml = '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>';

  return `
    <div class="lesson-card" data-id="${l.id}">
      <div class="lesson-thumb">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">${l.type === 'pdf' ? iconPdf : iconHtml}</svg>
        <span class="lesson-thumb-badge badge badge-${l.type}">${l.type.toUpperCase()}</span>
      </div>
      <div class="lesson-info">
        <p class="lesson-name truncate" title="${l.name}">${l.name}</p>
        <p class="lesson-meta">${dateStr}${sizeStr ? ' · ' + sizeStr : ''}</p>
        <div>${chipHtml}</div>
        <div class="bloco-editor" id="be-${l.id}">
          <div class="bloco-presets" id="bp-${l.id}"></div>
          <div class="bloco-input-row">
            <input type="text" class="input input-sm" style="flex:1;padding:.4rem .625rem;font-size:.82rem;"
              id="bi-${l.id}" placeholder="Nome do módulo..." list="blocoDL">
            <button type="button" class="btn btn-primary btn-sm" onclick="saveBloco('${l.id}')">OK</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="toggleEditor('${l.id}')">✕</button>
          </div>
        </div>
      </div>
      <div class="lesson-actions">
        <button class="btn btn-primary btn-sm" onclick="startSession('${l.id}','${sName}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Iniciar aula
        </button>
        <button class="btn btn-ghost btn-sm btn-icon" title="Excluir" onclick="deleteLesson('${l.id}','${sName}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
}

// ─── Bloco editor ──────────────────────────────────────────────────────────────
function toggleEditor(id) {
  const ed  = document.getElementById(`be-${id}`);
  if (!ed) return;
  const was = ed.classList.contains('open');
  document.querySelectorAll('.bloco-editor.open').forEach(e => e.classList.remove('open'));
  if (was) return;

  ed.classList.add('open');

  const lesson  = lessons.find(l => l.id === id);
  const inp     = document.getElementById(`bi-${id}`);
  if (inp) { inp.value = lesson?.bloco || ''; inp.focus(); }

  // Presets from existing blocos
  const existing = [...new Set(lessons.map(l => l.bloco || '').filter(Boolean))].sort();
  const presEl   = document.getElementById(`bp-${id}`);
  if (presEl) {
    let ph = existing.map(b => {
      const c   = blocoColor(b);
      const esc = b.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return `<button type="button" class="preset-btn" style="background:${c}" onclick="applyPreset('${id}','${esc}')">${b}</button>`;
    }).join('');
    if (lesson?.bloco) ph += `<button type="button" class="preset-btn" style="background:rgba(0,0,0,.18)" onclick="applyPreset('${id}','')">Sem módulo</button>`;
    presEl.innerHTML = ph;
  }
}

function applyPreset(id, bloco) {
  const inp = document.getElementById(`bi-${id}`);
  if (inp) inp.value = bloco;
  saveBloco(id);
}

async function saveBloco(id) {
  const inp   = document.getElementById(`bi-${id}`);
  const bloco = (inp?.value || '').trim();
  try {
    const res = await fetch(`/api/lessons/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bloco }),
    });
    if (!res.ok) throw new Error();
    const updated = await res.json();
    const idx = lessons.findIndex(l => l.id === id);
    if (idx !== -1) lessons[idx] = { ...lessons[idx], ...updated };
    buildSidebar();
    renderLessons();
    toast(bloco ? `Módulo definido: ${bloco}` : 'Módulo removido');
  } catch {
    toast('Erro ao salvar módulo', 'err');
  }
}

// ─── Delete ────────────────────────────────────────────────────────────────────
async function deleteLesson(id, name) {
  if (!confirm(`Excluir "${name}"?`)) return;
  const res = await fetch(`/api/lessons/${id}`, { method: 'DELETE' });
  if (res.ok) {
    lessons = lessons.filter(l => l.id !== id);
    buildSidebar();
    renderLessons();
    toast('Aula excluída');
  } else {
    toast('Erro ao excluir', 'err');
  }
}

// ─── Session ───────────────────────────────────────────────────────────────────
let currentSession = null;

async function startSession(lessonId, lessonName) {
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lessonId }),
  });
  if (!res.ok) { toast('Erro ao criar sessão', 'err'); return; }
  const data = await res.json();
  currentSession = { roomCode: data.roomCode, lessonId, lessonName };
  sessionStorage.setItem('currentSession', JSON.stringify(currentSession));
  document.getElementById('bannerLessonName').textContent = lessonName;
  document.getElementById('bannerCode').textContent       = data.roomCode;
  document.getElementById('sessionBanner').classList.remove('hidden');
  toast(`Sala criada: ${data.roomCode}`);
}

document.getElementById('bannerOpenBtn').addEventListener('click', () => {
  if (currentSession) location.href = `apresentacao.html?sala=${currentSession.roomCode}`;
});
document.getElementById('bannerEndBtn').addEventListener('click', () => {
  currentSession = null;
  sessionStorage.removeItem('currentSession');
  document.getElementById('sessionBanner').classList.add('hidden');
  toast('Sala encerrada');
});

const saved = sessionStorage.getItem('currentSession');
if (saved) {
  try {
    currentSession = JSON.parse(saved);
    document.getElementById('bannerLessonName').textContent = currentSession.lessonName;
    document.getElementById('bannerCode').textContent       = currentSession.roomCode;
    document.getElementById('sessionBanner').classList.remove('hidden');
  } catch {}
}

// ─── Upload ────────────────────────────────────────────────────────────────────
document.getElementById('sidebarUploadBtn').addEventListener('click', () => {
  document.getElementById('uploadCard').classList.remove('hidden');
  document.getElementById('uploadCard').scrollIntoView({ behavior: 'smooth' });
});
document.getElementById('closeUploadBtn').addEventListener('click', () => {
  document.getElementById('uploadCard').classList.add('hidden');
});

const uploadZone  = document.getElementById('uploadZone');
const fileInput   = document.getElementById('fileInput');
const nameRow     = document.getElementById('nameRow');
const lessonName  = document.getElementById('lessonName');
const uploadBtn   = document.getElementById('uploadBtn');
const cancelBtn   = document.getElementById('cancelUploadBtn');
const uploadProg  = document.getElementById('uploadProgress');
const progressBar = document.getElementById('progressBar');
const progressTxt = document.getElementById('progressText');
let selectedFile  = null;

['dragenter','dragover'].forEach(ev =>
  uploadZone.addEventListener(ev, e => { e.preventDefault(); uploadZone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev =>
  uploadZone.addEventListener(ev, () => uploadZone.classList.remove('drag')));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer?.files[0];
  if (f) selectFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });

function selectFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','html','htm'].includes(ext)) { toast('Apenas PDF ou HTML', 'err'); return; }
  selectedFile = file;
  lessonName.value = file.name.replace(/\.[^.]+$/, '');
  nameRow.classList.remove('hidden');
  uploadProg.style.display = 'none';
}

cancelBtn.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  nameRow.classList.add('hidden');
  uploadProg.style.display = 'none';
});

uploadBtn.addEventListener('click', () => {
  if (!selectedFile) return;
  const name  = lessonName.value.trim() || selectedFile.name;
  const bloco = document.getElementById('lessonBlocoInput').value.trim();
  uploadBtn.disabled = true;
  nameRow.classList.add('hidden');
  uploadProg.style.display = 'block';
  progressBar.style.width  = '0%';
  progressTxt.textContent  = 'Enviando...';

  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('name', name);
  fd.append('bloco', bloco);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/lessons/upload');
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressBar.style.width = pct + '%';
      progressTxt.textContent = `Enviando... ${pct}%`;
    }
  };
  xhr.onload = () => {
    uploadProg.style.display = 'none';
    uploadBtn.disabled = false;
    fileInput.value = '';
    selectedFile = null;
    if (xhr.status === 200) {
      const lesson = JSON.parse(xhr.responseText);
      lessons.unshift(lesson);
      document.getElementById('lessonBlocoInput').value = '';
      document.getElementById('uploadCard').classList.add('hidden');
      buildSidebar();
      renderLessons();
      toast(`"${lesson.name}" enviada!`);
    } else {
      toast('Erro ao enviar arquivo', 'err');
      nameRow.classList.remove('hidden');
    }
  };
  xhr.onerror = () => {
    toast('Erro de rede', 'err');
    uploadProg.style.display = 'none';
    uploadBtn.disabled = false;
  };
  xhr.send(fd);
});

// ─── Init ──────────────────────────────────────────────────────────────────────
loadLessons();
</script>
